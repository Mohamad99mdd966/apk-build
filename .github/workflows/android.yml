name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: "**/*.apk"
